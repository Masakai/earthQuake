<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>インフラサウンドセンサー 配管図</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8fa;
        padding: 2rem;
        color: #1f2328;
    }
    h1 { font-size: 1.2rem; margin-bottom: 0.4rem; }
    p.note { font-size: 0.85rem; color: #656d76; margin-bottom: 1.5rem; }
    .diagrams { display: flex; flex-direction: column; gap: 3rem; }
    .diagram-block { background: #fff; border: 1px solid #d0d7de; border-radius: 8px; padding: 1.5rem; }
    .diagram-block h2 { font-size: 1rem; margin-bottom: 1rem; color: #0969da; }
    svg text { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
</style>
</head>
<body>

<h1>インフラサウンドセンサー 配管図（SDP810-125Pa + ESP32）</h1>
<p class="note">低周波音（インフラサウンド）計測用の配管レイアウト。シンプル版とTチューブ型（風雑音低減）の2パターン。</p>

<div class="diagrams">

<!-- ===== シンプル版 ===== -->
<div class="diagram-block">
    <h2>パターン A：シンプル版（入門向け）</h2>
    <svg width="700" height="420" viewBox="0 0 700 420">

        <!-- 外気 -->
        <text x="60" y="30" font-size="13" fill="#656d76">外気</text>
        <line x1="90" y1="35" x2="90" y2="75" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>

        <!-- ピンホールキャップ -->
        <rect x="50" y="75" width="80" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="90" y="91" font-size="11" fill="#1d4ed8" text-anchor="middle">塩ビキャップ</text>
        <text x="90" y="107" font-size="11" fill="#1d4ed8" text-anchor="middle">＋注射針</text>
        <!-- 針の穴マーク -->
        <circle cx="90" cy="115" r="3" fill="#3b82f6"/>
        <text x="135" y="100" font-size="10" fill="#888">φ0.5〜1mm</text>
        <text x="135" y="113" font-size="10" fill="#888">（ピンホール）</text>

        <!-- チューブ A -->
        <line x1="90" y1="118" x2="90" y2="160" stroke="#f59e0b" stroke-width="4"/>
        <text x="100" y="142" font-size="10" fill="#b45309">シリコンチューブ</text>
        <text x="100" y="154" font-size="10" fill="#b45309">内径 2mm</text>

        <!-- SDP810 -->
        <rect x="40" y="160" width="100" height="70" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
        <text x="90" y="183" font-size="12" font-weight="bold" fill="#065f46" text-anchor="middle">SDP810</text>
        <text x="90" y="198" font-size="10" fill="#065f46" text-anchor="middle">-125Pa</text>
        <!-- P1ポート（上） -->
        <rect x="78" y="153" width="24" height="10" rx="2" fill="#10b981"/>
        <text x="90" y="161" font-size="9" fill="white" text-anchor="middle">P1</text>
        <!-- P2ポート（下） -->
        <rect x="78" y="228" width="24" height="10" rx="2" fill="#10b981"/>
        <text x="90" y="236" font-size="9" fill="white" text-anchor="middle">P2</text>

        <!-- チューブ B -->
        <line x1="90" y1="238" x2="90" y2="280" stroke="#f59e0b" stroke-width="4"/>

        <!-- 密閉チャンバー -->
        <rect x="30" y="280" width="120" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
        <text x="90" y="315" font-size="12" font-weight="bold" fill="#92400e" text-anchor="middle">密閉チャンバー</text>
        <text x="90" y="332" font-size="10" fill="#92400e" text-anchor="middle">塩ビパイプ</text>
        <text x="90" y="347" font-size="10" fill="#92400e" text-anchor="middle">φ40 × 80mm</text>
        <text x="90" y="362" font-size="10" fill="#92400e" text-anchor="middle">容積 約100mL</text>
        <!-- 底キャップ -->
        <rect x="30" y="375" width="120" height="12" rx="4" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="90" y="385" font-size="9" fill="#78350f" text-anchor="middle">塩ビキャップ（密閉）</text>

        <!-- I2C配線 -->
        <line x1="140" y1="195" x2="300" y2="195" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,3"/>
        <text x="148" y="190" font-size="10" fill="#7c3aed">I²C (SDA/SCL)</text>

        <!-- ESP32 -->
        <rect x="300" y="155" width="130" height="120" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
        <text x="365" y="185" font-size="13" font-weight="bold" fill="#5b21b6" text-anchor="middle">ESP32</text>
        <text x="365" y="202" font-size="10" fill="#5b21b6" text-anchor="middle">GPIO21 → SDA</text>
        <text x="365" y="217" font-size="10" fill="#5b21b6" text-anchor="middle">GPIO22 → SCL</text>
        <text x="365" y="232" font-size="10" fill="#5b21b6" text-anchor="middle">3.3V / GND</text>
        <!-- WiFi -->
        <text x="365" y="255" font-size="10" fill="#7c3aed" text-anchor="middle">WiFi / シリアル</text>
        <line x1="365" y1="258" x2="365" y2="290" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3"/>
        <text x="365" y="305" font-size="11" fill="#5b21b6" text-anchor="middle">PC / サーバー</text>

        <!-- 凡例 -->
        <rect x="460" y="60" width="220" height="170" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
        <text x="570" y="82" font-size="12" font-weight="bold" fill="#1f2328" text-anchor="middle">凡例</text>
        <rect x="475" y="95" width="18" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
        <text x="500" y="104" font-size="11" fill="#1f2328">塩ビキャップ（開口側）</text>
        <rect x="475" y="115" width="18" height="10" rx="2" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
        <text x="500" y="124" font-size="11" fill="#1f2328">SDP810センサー</text>
        <rect x="475" y="135" width="18" height="10" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="500" y="144" font-size="11" fill="#1f2328">密閉チャンバー</text>
        <rect x="475" y="155" width="18" height="10" rx="2" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
        <text x="500" y="164" font-size="11" fill="#1f2328">ESP32マイコン</text>
        <line x1="475" y1="180" x2="493" y2="180" stroke="#f59e0b" stroke-width="4"/>
        <text x="500" y="184" font-size="11" fill="#1f2328">シリコンチューブ</text>
        <line x1="475" y1="200" x2="493" y2="200" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,3"/>
        <text x="500" y="204" font-size="11" fill="#1f2328">I²C配線</text>

        <!-- 注記 -->
        <text x="460" y="260" font-size="11" fill="#656d76">● P1: 音波入力側（ピンホール経由）</text>
        <text x="460" y="277" font-size="11" fill="#656d76">● P2: 基準圧力側（密閉チャンバー）</text>
        <text x="460" y="294" font-size="11" fill="#656d76">● チャンバー容積↑ → 低周波感度↑</text>
        <text x="460" y="311" font-size="11" fill="#656d76">● ピンホール径↓ → 低域カットオフ↓</text>
    </svg>
</div>

<!-- ===== Tチューブ型 ===== -->
<div class="diagram-block">
    <h2>パターン B：Tチューブ型（風雑音低減・精度向上）</h2>
    <svg width="700" height="400" viewBox="0 0 700 400">

        <!-- 左ピンホール -->
        <text x="40" y="25" font-size="12" fill="#656d76">外気（左）</text>
        <line x1="70" y1="30" x2="70" y2="65" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
        <rect x="35" y="65" width="70" height="35" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="70" y="80" font-size="10" fill="#1d4ed8" text-anchor="middle">キャップ</text>
        <text x="70" y="93" font-size="10" fill="#1d4ed8" text-anchor="middle">＋針（φ0.8mm）</text>

        <!-- 右ピンホール -->
        <text x="540" y="25" font-size="12" fill="#656d76">外気（右）</text>
        <line x1="580" y1="30" x2="580" y2="65" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
        <rect x="545" y="65" width="70" height="35" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="580" y="80" font-size="10" fill="#1d4ed8" text-anchor="middle">キャップ</text>
        <text x="580" y="93" font-size="10" fill="#1d4ed8" text-anchor="middle">＋針（φ0.8mm）</text>

        <!-- 横管（T字の水平部） -->
        <line x1="70" y1="100" x2="325" y2="100" stroke="#f59e0b" stroke-width="6"/>
        <line x1="325" y1="100" x2="580" y2="100" stroke="#f59e0b" stroke-width="6"/>
        <text x="160" y="92" font-size="10" fill="#b45309">シリコンチューブ（内径2mm）</text>

        <!-- T字分岐 -->
        <circle cx="325" cy="100" r="8" fill="#f59e0b" stroke="#b45309" stroke-width="1.5"/>

        <!-- 縦管（T字の垂直部） -->
        <line x1="325" y1="108" x2="325" y2="155" stroke="#f59e0b" stroke-width="6"/>

        <!-- SDP810 -->
        <rect x="275" y="155" width="100" height="70" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
        <text x="325" y="178" font-size="12" font-weight="bold" fill="#065f46" text-anchor="middle">SDP810</text>
        <text x="325" y="194" font-size="10" fill="#065f46" text-anchor="middle">-125Pa</text>
        <rect x="313" y="148" width="24" height="10" rx="2" fill="#10b981"/>
        <text x="325" y="156" font-size="9" fill="white" text-anchor="middle">P1</text>
        <rect x="313" y="223" width="24" height="10" rx="2" fill="#10b981"/>
        <text x="325" y="231" font-size="9" fill="white" text-anchor="middle">P2</text>

        <!-- 縦管 下 -->
        <line x1="325" y1="233" x2="325" y2="275" stroke="#f59e0b" stroke-width="6"/>

        <!-- 密閉チャンバー -->
        <rect x="260" y="275" width="130" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
        <text x="325" y="305" font-size="12" font-weight="bold" fill="#92400e" text-anchor="middle">密閉チャンバー</text>
        <text x="325" y="322" font-size="10" fill="#92400e" text-anchor="middle">容積 100〜500mL</text>
        <text x="325" y="338" font-size="10" fill="#92400e" text-anchor="middle">（大きいほど低域感度↑）</text>
        <rect x="260" y="360" width="130" height="10" rx="4" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>

        <!-- I2C配線 -->
        <line x1="375" y1="190" x2="490" y2="190" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,3"/>

        <!-- ESP32 -->
        <rect x="490" y="155" width="120" height="100" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
        <text x="550" y="180" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle">ESP32</text>
        <text x="550" y="197" font-size="10" fill="#5b21b6" text-anchor="middle">I²C接続</text>
        <text x="550" y="212" font-size="10" fill="#5b21b6" text-anchor="middle">WiFi送信</text>
        <text x="487" y="188" font-size="9" fill="#7c3aed">I²C</text>

        <!-- 風キャンセル説明 -->
        <rect x="20" y="310" width="220" height="70" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
        <text x="130" y="330" font-size="11" font-weight="bold" fill="#854d0e" text-anchor="middle">風雑音キャンセルの原理</text>
        <text x="130" y="347" font-size="10" fill="#854d0e" text-anchor="middle">風は両側のピンホールに</text>
        <text x="130" y="362" font-size="10" fill="#854d0e" text-anchor="middle">同時に当たり逆位相で打ち消し合う</text>
        <text x="130" y="377" font-size="10" fill="#854d0e" text-anchor="middle">→ 音波のみ検出感度が上がる</text>

        <!-- 部材リスト -->
        <rect x="20" y="165" width="220" height="120" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
        <text x="130" y="183" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">必要部材（パターンB）</text>
        <text x="30" y="200" font-size="10" fill="#166534">・塩ビパイプ VP-13 × 400mm</text>
        <text x="30" y="215" font-size="10" fill="#166534">・T字ジョイント（内径13mm）× 1</text>
        <text x="30" y="230" font-size="10" fill="#166534">・塩ビキャップ × 3（両端＋底）</text>
        <text x="30" y="245" font-size="10" fill="#166534">・注射針 20G × 2（ピンホール用）</text>
        <text x="30" y="260" font-size="10" fill="#166534">・シリコンチューブ 内径2mm × 適量</text>
        <text x="30" y="275" font-size="10" fill="#166534">・エポキシ接着剤（気密確保）</text>
    </svg>
</div>

</div><!-- /.diagrams -->

<p style="margin-top:2rem; font-size:0.8rem; color:#656d76;">

</html>
