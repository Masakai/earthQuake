});

  subdomains: 'abcd',
  maxZoom: 14,
}).addTo(map);

// 距離円
const circleStyle = { color: '#4a9eff', weight: 1, fill: false, dashArray: '4 4', opacity: 0.6 };
L.circle([MY_LAT, MY_LON], { radius: 100000, ...circleStyle }).addTo(map)
  .bindTooltip('100 km', {permanent:false, direction:'right'});
L.circle([MY_LAT, MY_LON], { radius: 200000, ...circleStyle }).addTo(map)
  .bindTooltip('200 km', {permanent:false, direction:'right'});
L.circle([MY_LAT, MY_LON], { radius: 300000, ...circleStyle }).addTo(map)
  .bindTooltip('300 km', {permanent:false, direction:'right'});

// Haversine距離（km）
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 観測点マーカー
STATIONS.forEach(s => {
  const isMine = s.code === 'AM.R38DC';
  const dist = haversine(MY_LAT, MY_LON, s.lat, s.lon).toFixed(0);
  const color = isMine ? '#ff6b35' : '#4a9eff';
  const radius = isMine ? 10 : 7;
  const icon = L.circleMarker([s.lat, s.lon], {
    radius,
    color: isMine ? '#ff4400' : '#1a6fcc',
    weight: isMine ? 2 : 1,
    fillColor: color,
    fillOpacity: isMine ? 1.0 : 0.75,
  });
  const popup = `
    <div style="font-family:'Hiragino Sans',sans-serif;font-size:13px;line-height:1.7;">
      <strong style="color:#4a9eff;">${s.code}</strong><br>
      ${s.pref} ${s.city}<br>
      緯度 ${s.lat}° / 経度 ${s.lon}°<br>
      標高 ${s.elev_m} m<br>
      稼働開始: ${s.active_since}<br>
      ${isMine ? '<span style="color:#ff6b35;font-weight:bold;">★ 自局</span>' : '自局から <strong>' + dist + ' km</strong>'}
    </div>`;
  icon.bindPopup(popup);
  icon.bindTooltip(s.code.replace('AM.',''), {direction:'top', offset:[0,-4]});
  icon.addTo(map);
});
